<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Request path for a growing web system</title>
  <desc id="desc">Original diagram showing clients flowing through geo routing, CDN, load balancer, application servers, cache, database, queue, and logging pipeline.</desc>
  <rect width="1200" height="620" fill="#0d0e0b"/>
  <g stroke="#2f332a" stroke-width="1">
    <path d="M0 80h1200M0 160h1200M0 240h1200M0 320h1200M0 400h1200M0 480h1200M0 560h1200"/>
    <path d="M100 0v620M200 0v620M300 0v620M400 0v620M500 0v620M600 0v620M700 0v620M800 0v620M900 0v620M1000 0v620M1100 0v620"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#22c55e"/>
    </marker>
    <style>
      .box{fill:#151611;stroke:#3a3d32;stroke-width:2;rx:8}
      .label{fill:#f2f1ea;font:700 24px ui-sans-serif,system-ui,sans-serif}
      .small{fill:#aaa79a;font:18px ui-monospace,SFMono-Regular,Menlo,monospace}
      .flow{stroke:#22c55e;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="box" x="56" y="78" width="170" height="92"/>
  <text class="label" x="92" y="118">Clients</text>
  <text class="small" x="83" y="146">web / mobile</text>
  <rect class="box" x="286" y="78" width="178" height="92"/>
  <text class="label" x="322" y="118">Geo DNS</text>
  <text class="small" x="317" y="146">nearest region</text>
  <rect class="box" x="526" y="78" width="178" height="92"/>
  <text class="label" x="584" y="118">CDN</text>
  <text class="small" x="552" y="146">edge cache</text>
  <rect class="box" x="766" y="78" width="178" height="92"/>
  <text class="label" x="810" y="118">Load</text>
  <text class="small" x="800" y="146">balancer</text>
  <rect class="box" x="1000" y="56" width="150" height="70"/>
  <text class="label" x="1036" y="99">App A</text>
  <rect class="box" x="1000" y="148" width="150" height="70"/>
  <text class="label" x="1036" y="191">App B</text>
  <path class="flow" d="M226 124h56"/>
  <path class="flow" d="M464 124h58"/>
  <path class="flow" d="M704 124h58"/>
  <path class="flow" d="M944 124c26 0 30-33 52-33"/>
  <path class="flow" d="M944 124c26 0 30 59 52 59"/>
  <rect class="box" x="196" y="330" width="180" height="86"/>
  <text class="label" x="234" y="365">Cache</text>
  <text class="small" x="232" y="392">hot reads</text>
  <rect class="box" x="486" y="330" width="190" height="86"/>
  <text class="label" x="525" y="365">Database</text>
  <text class="small" x="531" y="392">source of truth</text>
  <rect class="box" x="786" y="330" width="180" height="86"/>
  <text class="label" x="835" y="365">Queue</text>
  <text class="small" x="824" y="392">async work</text>
  <rect class="box" x="486" y="492" width="190" height="70"/>
  <text class="label" x="531" y="535">Logs</text>
  <path class="flow" d="M1075 218c0 74-756 44-790 108"/>
  <path class="flow" d="M1075 218c0 80-478 38-494 108"/>
  <path class="flow" d="M1075 218c0 80-184 38-199 108"/>
  <path class="flow" d="M581 416v70"/>
  <text class="small" x="68" y="584">Scale by separating paths: static content, request routing, compute, hot reads, durable writes, background work, and observability.</text>
</svg>
