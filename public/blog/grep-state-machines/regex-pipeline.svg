<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Regex engine pipeline</title>
  <desc id="desc">Original diagram showing a regex pattern becoming tokens, postfix notation, an NFA, and then a line matcher.</desc>
  <rect width="1200" height="520" fill="#0d0e0b"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#22c55e"/>
    </marker>
    <style>
      .box{fill:#151611;stroke:#3a3d32;stroke-width:2;rx:8}
      .title{fill:#f2f1ea;font:700 26px ui-sans-serif,system-ui,sans-serif}
      .small{fill:#aaa79a;font:18px ui-monospace,SFMono-Regular,Menlo,monospace}
      .flow{stroke:#22c55e;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <text class="title" x="62" y="64">A tiny grep becomes a compiler pipeline</text>
  <rect class="box" x="62" y="136" width="184" height="110"/>
  <text class="title" x="106" y="177">Pattern</text>
  <text class="small" x="104" y="210">a(b|c)*d</text>
  <rect class="box" x="304" y="136" width="184" height="110"/>
  <text class="title" x="358" y="177">Tokens</text>
  <text class="small" x="334" y="210">Literal / Or / Star</text>
  <rect class="box" x="546" y="136" width="184" height="110"/>
  <text class="title" x="604" y="177">Postfix</text>
  <text class="small" x="586" y="210">abc|*d..</text>
  <rect class="box" x="788" y="136" width="184" height="110"/>
  <text class="title" x="845" y="177">NFA</text>
  <text class="small" x="820" y="210">states + epsilon</text>
  <rect class="box" x="980" y="322" width="168" height="92"/>
  <text class="title" x="1024" y="360">Match</text>
  <text class="small" x="1016" y="390">line by line</text>
  <path class="flow" d="M246 191h52"/>
  <path class="flow" d="M488 191h52"/>
  <path class="flow" d="M730 191h52"/>
  <path class="flow" d="M880 246c0 74 98 64 98 114"/>
  <text class="small" x="62" y="458">The CLI is simple; the interesting work is translating text into a machine that can walk input characters.</text>
</svg>
